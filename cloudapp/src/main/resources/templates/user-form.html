<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cloud App User Form </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4">User Form</h1>

    <form th:action="@{/users}" th:object="${user}" method="post">
        <input type="hidden" th:field="*{id}">
        <!--First Name-->
        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" th:field="*{firstName}" class="form-control" required>
        </div>
        <!--Last name-->
        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" th:field="*{lastName}" class="form-control" required>
        </div>
        <!--Phone number-->
        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" th:field="*{phone}" class="form-control">
        </div>
        <!--Email-->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>
        <!--Age-->
        <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" th:field="*{age}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a href="/users" class="btn btn-secondary">Cancel</a>

    </form>
</div>

</body>
</html>
